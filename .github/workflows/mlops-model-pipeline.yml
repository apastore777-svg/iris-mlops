name: MLOps Model Pipeline

on:
  workflow_dispatch:

jobs:

  train:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    outputs:
      version: ${{ steps.model.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow requests scikit-learn

      - name: Train model
        run: |
          python src/training/train_iris_mlflow.py

      - name: Get latest version
        id: model
        run: |
          VERSION=$(python scripts/get_latest_model_version.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  test:
    needs: train
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Test endpoint
        run: |
          python tests/serving/test_candidate.py

  deploy:
    needs: train
    runs-on: ubuntu-latest

    environment: prod

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow requests

      - name: Promote champion
        run: |
          VERSION=${{ needs.train.outputs.version }}
          python scripts/promote_model.py $VERSION

      - name: Update endpoint
        run: |
          VERSION=${{ needs.train.outputs.version }}
          ./scripts/update_serving_endpoint.sh $VERSION
