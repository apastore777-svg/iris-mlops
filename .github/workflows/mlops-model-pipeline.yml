name: MLOps Model Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  train:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    outputs:
      version: ${{ steps.model.outputs.version }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow scikit-learn requests

      - name: Train model
        run: |
          python src/training/train_iris_mlflow.py

      - name: Get latest model version
        id: model
        run: |
          VERSION=$(python scripts/get_latest_model_version.py)
          echo "Detected model version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  test:

    needs: train
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest requests

      - name: Test candidate endpoint
        run: |
          python scripts/test_candidate.py

  deploy:

    needs: [train, test]
    runs-on: ubuntu-latest

    environment: prod

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install mlflow requests

      - name: Promote champion model
        run: |
          VERSION=${{ needs.train.outputs.version }}
          echo "Promoting model version $VERSION"
          python scripts/promote_model.py $VERSION

      - name: Update serving endpoint
        run: |
          VERSION=${{ needs.train.outputs.version }}
          echo "Updating serving endpoint with version $VERSION"
          ./scripts/update_serving_endpoint.sh $VERSION
