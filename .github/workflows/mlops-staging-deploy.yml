name: MLOps STAGING Deploy

on:
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to STAGING (QA)
        run: bash scripts/deploy_staging.sh

      - name: Done
        run: echo "✅ STAGING deployment completed"
