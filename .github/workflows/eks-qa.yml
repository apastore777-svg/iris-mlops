name: Deploy EKS QA

on:
  push:
    branches:
      - k8s-qa

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: qa

    env:
      AWS_REGION: us-east-2
      AWS_ACCOUNT_ID: 494722910828
      ECR_REPO: iris-api
      CLUSTER_NAME: ml-cluster-v3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: |
          docker build \
            -f app/Dockerfile \
            -t $ECR_REPO:k8s-qa-${{ github.sha }} .

      - name: Tag Docker image
        run: |
          docker tag $ECR_REPO:k8s-qa-${{ github.sha }} \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:k8s-qa-${{ github.sha }}

      - name: Push Docker image to ECR
        run: |
          docker push \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:k8s-qa-${{ github.sha }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $CLUSTER_NAME \
            --region $AWS_REGION

      - name: Replace image tag in Kubernetes manifest
        run: |
          sed -i "s|IMAGE_TAG|k8s-qa-${{ github.sha }}|g" infra/kubernetes/qa/deployment.yaml

      - name: Deploy to EKS
        run: |
          kubectl apply -f infra/kubernetes/qa/
