name: MLOps PROD Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    environment:
      name: prod

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Start
        run: echo "🚀 Starting PROD deployment..."

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Promote model
        run: python src/deployment/promote_model.py

      # 🔥 Configurar credenciais AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Build and Push Docker Image
        run: bash scripts/build_and_push.sh

      - name: Deploy Kubernetes
        run: kubectl apply -f infra/kubernetes/prod/

      - name: Finish
        run: echo "✅ Production deployed"
