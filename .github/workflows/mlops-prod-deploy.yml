name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    # 🔐 GATE DE APROVAÇÃO (USA SEU ENVIRONMENT EXISTENTE)
    environment:
      name: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Debug start
        run: echo "🚀 Starting production deployment pipeline"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 🔥 PROMOÇÃO REAL NO MLflow
      - name: Promote model to Production (MLflow)
        run: |
          echo "📦 Promoting model to Production..."
          python src/deployment/promote_model.py

      # 🔥 BUILD + PUSH (USA SEU SCRIPT EXISTENTE)
      - name: Build and Push Docker image
        run: |
          echo "🐳 Building and pushing image..."
          bash scripts/build_and_push.sh

      # 🔥 DEPLOY K8S PROD
      - name: Deploy to Kubernetes (PROD)
        run: |
          echo "☸️ Deploying to Kubernetes PROD..."
          kubectl apply -f infra/kubernetes/prod/

      - name: Final step
        run: echo "✅ Production deployment completed successfully"
